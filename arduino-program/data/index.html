<!DOCTYPE html>
<html>
<head>
    <title>Delivery Robot</title>
    <!-- scales page size to device -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no", charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

    <!-- leaflet finds elements with id map and dist display and injects the proper html -->
    <div class="card">
        <div id="map" style="height: 400px; border-radius: 8px;"></div>
        <div id="dist-display" style="padding: 10px; text-align: center;">Waiting for GPS...</div>
    </div>

    <div class="telemetryBar">
        <span>Signal: <b id="rssiVal">0</b> dBm</span> |
        <span>Status: <b id="statusVal">READY</b></span> |
        <span>Satellites Found: <b id="satVal">0</b></span>
    </div>


    <div class="dpadContainer">
    <!-- hard coding the symbols so they dont turn into emojis -->
    <button class="dpadButton" id="up">&#9650;&#xFE0E;</button>
    <button class="dpadButton" id="left">&#9664;&#xFE0E;</button>
    <button class="dpadButton" id="right">&#9654;&#xFE0E;</button>
    <button class="dpadButton" id="down">&#9660;&#xFE0E;</button>
    </div>


</body>


<script>
    // for every dpad button class object, open this connection
    // this function is used to get a more responsive button press
    // 
    document.querySelectorAll('.dpadButton').forEach(button => {
        button.addEventListener('touchstart', () => {
            button.style.transform = "translateY(4px)";
            button.style.boxShadow = "none";
        });
        button.addEventListener('touchend', () => {
            button.style.transform = "translateY(0px)";
            button.style.boxShadow = "0 5px #333333";
        });
    });
</script>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="/websocket.js"></script> </body>
</html>
