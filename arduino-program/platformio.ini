; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200


#esp 1 will handle the websocket, sensor and gps
[env:esp1]
board_build.filesystem = littlefs
board_build.partitions = huge_app.csv
build_src_filter = +<*> -<main2.cpp>
upload_port = COM4
lib_deps = 
    LittleFS
    https://github.com/gamegine/HCSR04-ultrasonic-sensor-lib
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    esphome/AsyncTCP-esphome @ ^2.1.4
    bblanchon/ArduinoJson @ ^7.0.0

#esp 2 is dedicated to controlling the motors, it will just receive serial signals from esp1
[env:esp2]
build_src_filter = +<*> -<main1.cpp>